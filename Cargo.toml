[workspace]
resolver = "2"
members = [
    "exe/basicdd",
    "exe/winapi",
    "exe/zig_hello",
    "fc",
    "runtime",
    "win32/derive",
    "win32/winapi",
]

[workspace.dependencies]
pe = { path = "../../win/rs/pe" }
runtime = { path = "runtime" }
winapi = { path = "win32/winapi" }
zerocopy = { version = "0.8.40", features = ["derive"] }

[profile.release]
debug = true
