[workspace]
resolver = "2"
members = [
    "exe/basicdd",
    "exe/chillin",
    "exe/winapi",
    "exe/zig_hello",
    "tc",
    "runtime",
    "win32/derive",
    "win32/winapi",
    "logger",
]

[workspace.dependencies]
bitflags = "2.11.0"
bitflags-derive = "0.0.4"
pe = { path = "win32/pe" }
runtime = { path = "runtime" }
logger = { path = "logger" }
winapi = { path = "win32/winapi" }
zerocopy = { version = "0.8.40", features = ["derive"] }
log = "0.4.29"
widestring = "1.2.1"

[profile.release]
debug = true
